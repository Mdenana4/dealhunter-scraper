name: dealhunter_admin
description: DealHunter Admin Application for managing users, deals, and platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.2

  # State Management & Riverpod
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.0

  # Networking
  dio: ^5.4.0
  dio_logging: ^0.0.11

  # Navigation
  go_router: ^12.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.1.0

  # UI & Charts
  flutter_material_design_icons: ^0.0.2
  intl: ^0.19.0
  fl_chart: ^0.65.0

  # Utilities
  logger: ^2.1.0
  mockito: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
