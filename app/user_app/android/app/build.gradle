plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Read signing config from key.properties (written by Codemagic build script)
def keystoreProps = new Properties()
def keystoreFile = file('/tmp/key.properties')
if (keystoreFile.exists()) {
    keystoreFile.withInputStream { keystoreProps.load(it) }
}

android {
    namespace "com.dealhunter.app"
    compileSdk 36
    ndkVersion "28.2.13676358"

    defaultConfig {
        applicationId "com.dealhunter.app"
        minSdk 24
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias     keystoreProps['keyAlias']      ?: 'dealhunter'
            keyPassword  keystoreProps['keyPassword']   ?: ''
            storeFile    keystoreProps['storeFile']     ? file(keystoreProps['storeFile']) : null
            storePassword keystoreProps['storePassword'] ?: ''
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig keystoreFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'androidx.multidex:multidex:2.0.1'
}
