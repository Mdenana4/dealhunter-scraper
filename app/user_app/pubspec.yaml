name: user_app
description: DealHunter — find & track genuine deals across Egypt and GCC markets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4

  # State & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # HTTP
  dio: ^5.5.0+1

  # UI
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # WebView (payment)
  webview_flutter: ^4.8.0

  # Utilities
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  intl: ^0.19.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
