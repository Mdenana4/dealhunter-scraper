plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProps = new Properties()
def keystoreFile = file('/tmp/key.properties')
if (keystoreFile.exists()) {
    keystoreFile.withInputStream { keystoreProps.load(it) }
}

android {
    namespace "com.dealhunter.admin"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId "com.dealhunter.admin"
        minSdk 21
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keystoreFile.exists()) {
                keyAlias     keystoreProps['keyAlias']
                keyPassword  keystoreProps['keyPassword']
                storeFile    file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig keystoreFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
