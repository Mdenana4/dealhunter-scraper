name: admin_app
description: DealHunter Admin Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # UI
  material_design_icons_flutter: ^7.0.7296

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
