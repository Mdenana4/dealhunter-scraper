name: Build APK

on:
  push:
    branches: [ claude/dealhunter-scraper-setup-XFvRr ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
      - run: cd app/admin_app && flutter pub get
      - run: cd app/admin_app && flutter build apk --release
      - uses: actions/upload-artifact@v3
        with:
          name: app-release.apk
          path: app/admin_app/build/app/outputs/flutter-apk/app-release.apk
