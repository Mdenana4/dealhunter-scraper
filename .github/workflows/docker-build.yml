name: Docker Build Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'server.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'requirements.txt'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: dealhunter-scraper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify build successful
        run: echo "✓ Docker image built successfully"
