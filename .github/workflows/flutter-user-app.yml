name: Flutter User App — Build APK

on:
  push:
    branches: [main]
    paths:
      - 'app/user_app/**'
      - '.github/workflows/flutter-user-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/user_app/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Get dependencies
        run: |
          cd app/user_app
          flutter pub get

      - name: Analyze
        run: |
          cd app/user_app
          flutter analyze 2>&1 | tee analyze.log || true

      - name: Set up keystore
        env:
          CM_KEYSTORE: ${{ secrets.CM_KEYSTORE }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.CM_KEYSTORE_PASSWORD }}
          CM_KEY_PASSWORD: ${{ secrets.CM_KEY_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.CM_KEY_ALIAS }}
        run: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks
            cat > /tmp/key.properties <<EOF
          storeFile=/tmp/keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
            echo "Keystore ready — building signed release APK"
          else
            echo "No keystore secret — building debug APK"
          fi

      - name: Build APK
        run: |
          cd app/user_app
          if [ -f /tmp/key.properties ]; then
            flutter build apk --release --no-tree-shake-icons \
              --build-number=${{ github.run_number }}
            cp build/app/outputs/flutter-apk/app-release.apk \
              DealHunter-v${{ github.run_number }}-release.apk
          else
            flutter build apk --debug --no-tree-shake-icons \
              --build-number=${{ github.run_number }}
            cp build/app/outputs/flutter-apk/app-debug.apk \
              DealHunter-v${{ github.run_number }}-debug.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DealHunter-v${{ github.run_number }}
          path: app/user_app/DealHunter-v${{ github.run_number }}-*.apk
          retention-days: 30

      - name: Upload analyze log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log
          path: app/user_app/analyze.log
