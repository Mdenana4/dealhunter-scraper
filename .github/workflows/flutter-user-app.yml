name: Flutter User App — Build APK

on:
  push:
    branches: [main]
    paths:
      - 'app/user_app/**'
      - '.github/workflows/flutter-user-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/user_app/**'
  workflow_dispatch:   # lets you trigger a build manually from GitHub

permissions:
  contents: write   # needed to upload release artifacts
  actions: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
        timeout-minutes: 15

      - name: Get dependencies
        run: |
          cd app/user_app
          flutter pub get

      - name: Analyze
        run: |
          cd app/user_app
          flutter analyze --fatal-warnings 2>&1 | tee analyze.log || true
          tail -5 analyze.log

      - name: Set up keystore
        env:
          CM_KEYSTORE: ${{ secrets.CM_KEYSTORE }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.CM_KEYSTORE_PASSWORD }}
          CM_KEY_PASSWORD: ${{ secrets.CM_KEY_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.CM_KEY_ALIAS }}
        run: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks
            cat > /tmp/key.properties <<EOF
          storeFile=/tmp/keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
            echo "Keystore ready"
          else
            echo "No keystore configured — building debug APK"
          fi

      - name: Build APK
        run: |
          cd app/user_app
          if [ -f /tmp/key.properties ]; then
            flutter build apk --release --no-tree-shake-icons \
              --build-number=${{ github.run_number }}
            echo "APK_PATH=app/user_app/build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_ENV
            echo "APK_NAME=DealHunter-v${{ github.run_number }}-release.apk" >> $GITHUB_ENV
          else
            flutter build apk --debug --no-tree-shake-icons \
              --build-number=${{ github.run_number }}
            echo "APK_PATH=app/user_app/build/app/outputs/flutter-apk/app-debug.apk" >> $GITHUB_ENV
            echo "APK_NAME=DealHunter-v${{ github.run_number }}-debug.apk" >> $GITHUB_ENV
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload analyze log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: user-app-analyze-log
          path: app/user_app/analyze.log
