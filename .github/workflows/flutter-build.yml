name: Flutter Admin App — Analyze & Test

on:
  push:
    branches: [main]
    paths:
      - 'app/admin_app/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/admin_app/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-apk:
    name: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
        timeout-minutes: 15

      - name: Get dependencies
        run: |
          cd app/admin_app
          flutter pub get

      - name: Analyze (type-check all Dart code)
        run: |
          cd app/admin_app
          flutter analyze --fatal-warnings 2>&1 | tee analyze.log
          tail -5 analyze.log

      - name: Run tests
        run: |
          cd app/admin_app
          flutter test 2>/dev/null || echo "No tests found — skipping"

      - name: Upload analyze log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: app/admin_app/analyze.log
