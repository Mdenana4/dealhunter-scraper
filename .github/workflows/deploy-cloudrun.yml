name: Deploy to Google Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  PROJECT_ID: dealhunter-egypt-70d29
  REGION: us-central1
  SA_EMAIL: firebase-adminsdk-fbsvc@dealhunter-egypt-70d29.iam.gserviceaccount.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Server (Flask API) ──────────────────────────────────────────────────────
  deploy-server:
    name: Deploy API Server
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::warning::GCP_SA_KEY secret not set — skipping GCP deploy. Add it at: Settings → Secrets → Actions"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
        with:
          fetch-depth: 1

      - uses: google-github-actions/auth@v2
        if: steps.check.outputs.skip == 'false'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check.outputs.skip == 'false'

      - name: Configure Docker for GCR
        if: steps.check.outputs.skip == 'false'
        run: gcloud auth configure-docker --quiet

      - name: Build server image
        if: steps.check.outputs.skip == 'false'
        run: |
          docker build \
            -f Dockerfile.server \
            -t gcr.io/${{ env.PROJECT_ID }}/dealhunter-server:latest \
            .

      - name: Push server image
        if: steps.check.outputs.skip == 'false'
        run: docker push gcr.io/${{ env.PROJECT_ID }}/dealhunter-server:latest

      - name: Deploy server to Cloud Run
        if: steps.check.outputs.skip == 'false'
        run: |
          gcloud run deploy dealhunter-server \
            --image=gcr.io/${{ env.PROJECT_ID }}/dealhunter-server:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},TIMESCALE_URL=${{ secrets.DATABASE_URL }},FLASK_ENV=production,MIN_DISCOUNT=40,FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}"

      - name: Print server URL
        if: steps.check.outputs.skip == 'false'
        run: |
          gcloud run services describe dealhunter-server \
            --region=${{ env.REGION }} \
            --format='value(status.url)'

  # ── Scraper Job ─────────────────────────────────────────────────────────────
  deploy-scraper:
    name: Deploy Scraper Job
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::warning::GCP_SA_KEY secret not set — skipping GCP deploy. Add it at: Settings → Secrets → Actions"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
        with:
          fetch-depth: 1

      - uses: google-github-actions/auth@v2
        if: steps.check.outputs.skip == 'false'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check.outputs.skip == 'false'

      - name: Configure Docker for GCR
        if: steps.check.outputs.skip == 'false'
        run: gcloud auth configure-docker --quiet

      - name: Build scraper image
        if: steps.check.outputs.skip == 'false'
        run: |
          docker build \
            -f Dockerfile.scraper \
            -t gcr.io/${{ env.PROJECT_ID }}/dealhunter-scraper:latest \
            .

      - name: Push scraper image
        if: steps.check.outputs.skip == 'false'
        run: docker push gcr.io/${{ env.PROJECT_ID }}/dealhunter-scraper:latest

      - name: Deploy scraper Cloud Run Job
        if: steps.check.outputs.skip == 'false'
        run: |
          gcloud run jobs deploy dealhunter-scraper \
            --image=gcr.io/${{ env.PROJECT_ID }}/dealhunter-scraper:latest \
            --region=${{ env.REGION }} \
            --task-timeout=3600 \
            --max-retries=0 \
            --memory=2Gi \
            --cpu=2 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},TIMESCALE_URL=${{ secrets.DATABASE_URL }},MIN_DISCOUNT=40,SCRAPEDO_TOKEN=${{ secrets.SCRAPEDO_TOKEN }},FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}"

      - name: Schedule scraper every 6 hours
        if: steps.check.outputs.skip == 'false'
        run: |
          JOB_URI="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.PROJECT_ID }}/jobs/dealhunter-scraper:run"
          gcloud scheduler jobs update http dealhunter-scraper-schedule \
            --schedule="0 */6 * * *" \
            --uri="$JOB_URI" \
            --message-body="" \
            --oauth-service-account-email=${{ env.SA_EMAIL }} \
            --location=${{ env.REGION }} \
            2>/dev/null || \
          gcloud scheduler jobs create http dealhunter-scraper-schedule \
            --schedule="0 */6 * * *" \
            --uri="$JOB_URI" \
            --message-body="" \
            --oauth-service-account-email=${{ env.SA_EMAIL }} \
            --location=${{ env.REGION }}

  # ── Price Tracker Job ───────────────────────────────────────────────────────
  deploy-tracker:
    name: Deploy Price Tracker Job
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::warning::GCP_SA_KEY secret not set — skipping GCP deploy. Add it at: Settings → Secrets → Actions"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
        with:
          fetch-depth: 1

      - uses: google-github-actions/auth@v2
        if: steps.check.outputs.skip == 'false'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check.outputs.skip == 'false'

      - name: Configure Docker for GCR
        if: steps.check.outputs.skip == 'false'
        run: gcloud auth configure-docker --quiet

      - name: Build tracker image
        if: steps.check.outputs.skip == 'false'
        run: |
          docker build \
            -f Dockerfile.tracker \
            -t gcr.io/${{ env.PROJECT_ID }}/dealhunter-tracker:latest \
            .

      - name: Push tracker image
        if: steps.check.outputs.skip == 'false'
        run: docker push gcr.io/${{ env.PROJECT_ID }}/dealhunter-tracker:latest

      - name: Deploy tracker Cloud Run Job
        if: steps.check.outputs.skip == 'false'
        run: |
          gcloud run jobs deploy dealhunter-tracker \
            --image=gcr.io/${{ env.PROJECT_ID }}/dealhunter-tracker:latest \
            --region=${{ env.REGION }} \
            --task-timeout=300 \
            --max-retries=1 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},TIMESCALE_URL=${{ secrets.DATABASE_URL }},SCRAPEDO_TOKEN=${{ secrets.SCRAPEDO_TOKEN }}"

      - name: Fix Cloud Scheduler to point to tracker job
        if: steps.check.outputs.skip == 'false'
        run: |
          JOB_URI="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.PROJECT_ID }}/jobs/dealhunter-tracker:run"
          gcloud scheduler jobs update http dealhunter-tracker-schedule \
            --schedule="0 */8 * * *" \
            --uri="$JOB_URI" \
            --message-body="" \
            --oauth-service-account-email=${{ env.SA_EMAIL }} \
            --location=${{ env.REGION }} \
            2>/dev/null || \
          gcloud scheduler jobs create http dealhunter-tracker-schedule \
            --schedule="0 */8 * * *" \
            --uri="$JOB_URI" \
            --message-body="" \
            --oauth-service-account-email=${{ env.SA_EMAIL }} \
            --location=${{ env.REGION }}
