name: Backend Tests & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'server.py'
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server.py'
      - 'scraper.py'
      - 'requirements.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 server.py scraper.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Exit-zero treats all errors as warnings
          flake8 server.py scraper.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

  test-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import flask; import firebase_admin; import requests; import bs4; import schedule; print('✓ All dependencies installed successfully')"

  syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Check Python syntax
        run: |
          python -m py_compile server.py
          python -m py_compile scraper.py
          echo "✓ Python syntax check passed"
