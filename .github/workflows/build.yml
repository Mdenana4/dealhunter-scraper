name: Flutter APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > app/admin_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> app/admin_app/android/local.properties

      - name: Get dependencies
        run: |
          cd app/admin_app
          flutter pub get

      - name: Build APK
        run: |
          cd app/admin_app
          flutter build apk --release

      - name: Find APK
        run: find app/admin_app/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/admin_app/build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
