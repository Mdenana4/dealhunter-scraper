name: Deploy to Render

on:
  push:
    branches: [main, claude/review-app-deployment-o70ke]
    paths:
      - 'server.py'
      - 'scraper.py'
      - 'admin.html'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'start.sh'
      - '.github/workflows/deploy-render.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Deploy to Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK secret not set — skipping auto-deploy"
            echo ""
            echo "To fix this once:"
            echo "  1. https://dashboard.render.com/web/srv-d7cnfijeo5us73fekul0"
            echo "  2. Settings → Deploy Hook → copy URL"
            echo "  3. GitHub repo → Settings → Secrets → Actions → New secret"
            echo "     Name: RENDER_DEPLOY_HOOK   Value: <the URL>"
            exit 0
          fi
          echo "Triggering Render deploy for ${{ github.ref }} @ ${{ github.sha }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --request POST \
            --url "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --header 'content-type: application/json')
          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "✓ Deploy triggered (HTTP $HTTP)"
          else
            echo "✗ Deploy hook returned HTTP $HTTP"
            exit 1
          fi

      - name: Done
        run: |
          echo "Dashboard: https://dashboard.render.com/web/srv-d7cnfijeo5us73fekul0"
