name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'server.py'
      - 'scraper.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-render.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK secret not configured"
            echo "To enable auto-deployment:"
            echo "1. Go to https://dashboard.render.com/"
            echo "2. Select your service"
            echo "3. Go to Settings > Deploy Hook"
            echo "4. Copy the URL and add it as RENDER_DEPLOY_HOOK secret in GitHub"
          else
            curl --request POST \
              --url "${{ secrets.RENDER_DEPLOY_HOOK }}" \
              --header 'content-type: application/json' \
              -d '{"ref": "'"${{ github.ref }}"'", "commit": "'"${{ github.sha }}"'"}'
            echo "✓ Deployment triggered on Render"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deployment workflow completed"
            echo "Check Render dashboard: https://dashboard.render.com/web/srv-d7cnfijeo5us73fekul0"
          else
            echo "✗ Deployment workflow failed"
          fi
