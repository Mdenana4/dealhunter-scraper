name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules via REST API
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          pip install google-auth requests -q
          python3 - <<'EOF'
          import json, os, sys, time
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests

          creds_json = os.environ["FIREBASE_CREDENTIALS_JSON"]
          key = json.loads(creds_json)
          project = key["project_id"]

          creds = service_account.Credentials.from_service_account_info(
              key,
              scopes=["https://www.googleapis.com/auth/cloud-platform"]
          )
          req = google.auth.transport.requests.Request()
          creds.refresh(req)
          token = creds.token
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          with open("firestore.rules") as f:
              rules_content = f.read()

          # 1. Create ruleset
          ruleset_body = {
              "source": {
                  "files": [{"content": rules_content, "name": "firestore.rules"}]
              }
          }
          r = requests.post(
              f"https://firebaserules.googleapis.com/v1/projects/{project}/rulesets",
              headers=headers,
              json=ruleset_body,
          )
          r.raise_for_status()
          ruleset_name = r.json()["name"]
          print(f"Created ruleset: {ruleset_name}")

          # 2. Update the release to point to the new ruleset
          release_name = f"projects/{project}/releases/cloud.firestore"
          patch_body = {
              "release": {"name": release_name, "rulesetName": ruleset_name},
              "updateMask": "rulesetName",
          }
          r = requests.patch(
              f"https://firebaserules.googleapis.com/v1/{release_name}",
              headers=headers,
              json=patch_body,
          )
          r.raise_for_status()
          print("Firestore rules deployed successfully!")
          print(f"  Ruleset: {ruleset_name}")
          EOF

      - name: Verify rules allow deal reads
        run: |
          echo "Rules deployed. Key changes:"
          echo "  ✅ deals — any signed-in user can READ (user app can see deals)"
          echo "  ✅ admin_users — isAdmin() uses email-keyed documents"
          echo "  ✅ scraper_health, sources, etc. — admin only"
