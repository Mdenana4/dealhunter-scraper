name: Deploy Firestore Rules and Indexes

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install google-auth requests -q

      - name: Deploy Firestore rules
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          python3 - <<'EOF'
          import json, os
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests

          key = json.loads(os.environ["FIREBASE_CREDENTIALS_JSON"])
          project = key["project_id"]

          creds = service_account.Credentials.from_service_account_info(
              key, scopes=["https://www.googleapis.com/auth/cloud-platform"])
          creds.refresh(google.auth.transport.requests.Request())
          headers = {"Authorization": f"Bearer {creds.token}", "Content-Type": "application/json"}

          with open("firestore.rules") as f:
              rules_content = f.read()

          r = requests.post(
              f"https://firebaserules.googleapis.com/v1/projects/{project}/rulesets",
              headers=headers,
              json={"source": {"files": [{"content": rules_content, "name": "firestore.rules"}]}},
          )
          r.raise_for_status()
          ruleset_name = r.json()["name"]
          print(f"Created ruleset: {ruleset_name}")

          release_name = f"projects/{project}/releases/cloud.firestore"
          r = requests.patch(
              f"https://firebaserules.googleapis.com/v1/{release_name}",
              headers=headers,
              json={"release": {"name": release_name, "rulesetName": ruleset_name}, "updateMask": "rulesetName"},
          )
          r.raise_for_status()
          print("✅ Firestore rules deployed")
          EOF

      - name: Deploy Firestore indexes
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          python3 - <<'EOF'
          import json, os
          import google.auth.transport.requests
          from google.oauth2 import service_account
          import requests

          key = json.loads(os.environ["FIREBASE_CREDENTIALS_JSON"])
          project = key["project_id"]
          db = "(default)"

          creds = service_account.Credentials.from_service_account_info(
              key, scopes=["https://www.googleapis.com/auth/cloud-platform"])
          creds.refresh(google.auth.transport.requests.Request())
          headers = {"Authorization": f"Bearer {creds.token}", "Content-Type": "application/json"}

          with open("firestore.indexes.json") as f:
              config = json.load(f)

          base = f"https://firestore.googleapis.com/v1/projects/{project}/databases/{db}/collectionGroups"

          created = 0
          skipped = 0
          for idx in config["indexes"]:
              cg = idx["collectionGroup"]
              scope = idx.get("queryScope", "Collection")
              fields = [
                  {"fieldPath": f["fieldPath"],
                   "order": f.get("order", "ASCENDING")}
                  for f in idx["fields"]
              ]
              body = {"queryScope": scope, "fields": fields}
              r = requests.post(f"{base}/{cg}/indexes", headers=headers, json=body)
              if r.status_code == 409:
                  skipped += 1  # already exists
              elif r.status_code in (200, 201):
                  created += 1
                  print(f"  Creating index on {cg}: {[f['fieldPath'] for f in fields]}")
              else:
                  print(f"  Warning: {cg} index returned {r.status_code}: {r.text[:100]}")

          print(f"✅ Indexes: {created} created, {skipped} already existed")
          print("Note: New indexes take a few minutes to build in Firestore.")
          EOF

      - name: Summary
        run: |
          echo "=== Deployed ==="
          echo "✅ Firestore rules: deals readable by any signed-in user"
          echo "✅ Composite indexes for deals: site+timestamp, category+timestamp,"
          echo "   site+category+timestamp, site+discount_percent, category+discount_percent"
